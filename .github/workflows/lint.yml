# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: "Lint"

#
# Based on workflows from other projects:
# 
# * https://github.com/composer/composer/blob/2.9.8/.github/workflows/lint.yml
# * https://github.com/composer/composer/blob/2.9.8/.github/workflows/phpstan.yml
# * https://github.com/ramsey/composer-install/blob/4.0.0/.github/workflows/continuous-integration.yml
#

on:
  pull_request: ~
  push: ~
  workflow_dispatch: ~

# Cancels all previous workflow runs for the same branch that have not yet completed.
concurrency:
  # The concurrency group contains the workflow name and the branch name.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validation:
    name: "Composer Validation"

    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
        with:
          persist-credentials: false

      - name: "Setup PHP"
        uses: "shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240" # 2.37.2
        with:
          coverage: "none"
          extensions: "intl, zip"
          ini-values: "memory_limit=-1, error_reporting=E_ALL, display_errors=On"
          php-version: "latest"

      - name: "Install Composer dependencies"
        uses: "ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda" # 4.0.0
        with:
          dependency-versions: highest

      - name: "Validate composer.json"
        run: "composer validate --strict"

  lint:
    name: "Lint"

    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version:
          - "7.2"
          - "latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
        with:
          persist-credentials: false

      - name: "Setup PHP"
        uses: "shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240" # 2.37.2
        with:
          coverage: "none"
          extensions: "intl, zip"
          ini-values: "memory_limit=-1, error_reporting=E_ALL, display_errors=On"
          php-version: "${{ matrix.php-version }}"
          tools: cs2pr

      - name: "Install Composer dependencies"
        uses: "ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda" # 4.0.0
        with:
          dependency-versions: highest

      - name: "Install PHPUnit"
        run: "./vendor/bin/simple-phpunit install"

      - name: "Lint PHP files"
        run: |
          hasErrors=0
          for f in $(find src/ tests/ -type f -name '*.php' ! -path '*/vendor/*')
          do
            { error="$(php -derror_reporting=-1 -ddisplay_errors=1 -l -f $f 2>&1 1>&3 3>&-)"; } 3>&1;
            if [ "$error" != "" ]; then
              while IFS= read -r line; do echo "::error file=$f::$line"; done <<< "$error"
              hasErrors=1
            fi
          done
          if [ $hasErrors -eq 1 ]; then
            exit 1
          fi

      - name: "Run PHPStan"
        run: "./vendor/bin/phpstan analyse --error-format=checkstyle | cs2pr"
