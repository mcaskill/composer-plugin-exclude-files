# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: "Lint"

#
# Based on workflows from Composer:
# 
# * https://github.com/composer/composer/blob/2.9.8/.github/workflows/lint.yml
# * https://github.com/composer/composer/blob/2.9.8/.github/workflows/phpstan.yml
#

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - '**'
  pull_request:
    tags-ignore:
      - '**'

permissions:
  contents: read

jobs:
  validation:
    name: "Composer Validation"

    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

      - name: "Setup PHP"
        uses: "shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc" # 2.37.1
        with:
          coverage: "none"
          extensions: "intl, zip"
          ini-values: "memory_limit=-1, error_reporting=E_ALL, display_errors=On"
          php-version: "latest"

      - name: "Install Composer dependencies"
        uses: "ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda" # 4.0.0
        with:
          dependency-versions: highest

      - name: "Validate composer.json"
        run: "composer validate --strict"

  lint:
    name: "Lint"

    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version:
          - "7.2"
          - "latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

      - name: "Setup PHP"
        uses: "shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc" # 2.37.1
        with:
          coverage: "none"
          extensions: "intl, zip"
          ini-values: "memory_limit=-1, error_reporting=E_ALL, display_errors=On"
          php-version: "${{ matrix.php-version }}"
          tools: cs2pr

      - name: "Install Composer dependencies"
        uses: "ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda" # 4.0.0
        with:
          dependency-versions: highest

      - name: "Install PHPUnit"
        run: "./vendor/bin/simple-phpunit install"

      - name: "Lint PHP files"
        run: |
          hasErrors=0
          for f in $(find src/ tests/ -type f -name '*.php' ! -path '*/vendor/*')
          do
            { error="$(php -derror_reporting=-1 -ddisplay_errors=1 -l -f $f 2>&1 1>&3 3>&-)"; } 3>&1;
            if [ "$error" != "" ]; then
              while IFS= read -r line; do echo "::error file=$f::$line"; done <<< "$error"
              hasErrors=1
            fi
          done
          if [ $hasErrors -eq 1 ]; then
            exit 1
          fi

      - name: "Run PHPStan"
        run: "./vendor/bin/phpstan analyse --error-format=checkstyle | cs2pr"
